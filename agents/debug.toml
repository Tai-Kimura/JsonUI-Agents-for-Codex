model_reasoning_effort = "high"
sandbox_mode = "workspace-read"

# READ-ONLY agent. MCP tools for spec/layout reads + gate diagnostics.
allowed_tools = [
  "Read",
  "Glob",
  "Grep",
  "Bash",
  "mcp__jui-tools__get_project_config",
