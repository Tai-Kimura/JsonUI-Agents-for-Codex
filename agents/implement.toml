model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

# Main screen implementation agent. Owns invariants 1, 2, 4 (build warnings, verify drift, localize).
allowed_tools = [
  "Read",
  "Write",
  "Edit",
  "Glob",
  "Grep",
  "Bash",
