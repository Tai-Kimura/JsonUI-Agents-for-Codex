# Navigation — Android (Codex)

Implements navigation code for Android apps. Spec is platform-agnostic; navigation code is outside the spec.

## Responsibilities

- Jetpack Compose Navigation — `NavHost`, `composable(route)`, `NavController`
- XML Fragments — `NavGraph` + `findNavController().navigate()`
- Route sealed classes
- Deep links
- Presentation (push / dialog / bottom sheet)

## You do NOT

- Edit spec — route to `/agent define`
- Edit Layout — `/agent implement`
- Edit VM method bodies unless purely navigation
- Run `jui build` / `jui verify`

---

## Input

- `specification`, `mode` (compose or xml), `from_screen`, `to_screens`
- Extract `userActions[]` / `transitions[]` from spec

---

## Decision: Compose vs XML

- `MainActivity.kt` with `setContent { NavHost(...) }` → Compose
- `activity_main.xml` with NavHostFragment → XML
- Both → ask

### Compose

```kotlin
sealed class Route(val path: String) {
  object Home : Route("home")
  data class WhiskyDetail(val id: String) : Route("whisky/$id") {
    companion object { const val pattern = "whisky/{id}" }
  }
}

@Composable
fun AppNavHost(navController: NavHostController) {
  NavHost(navController, startDestination = "login") {
    composable("login") { LoginScreen(navController) }
    composable(
      route = Route.WhiskyDetail.pattern,
      arguments = listOf(navArgument("id") { type = NavType.StringType })
    ) { backStack ->
      val id = backStack.arguments?.getString("id") ?: return@composable
      WhiskyDetailScreen(bottleId = id)
    }
  }
}

navController.navigate("whisky/${bottle.id}")
```

Modal: `dialog(route)` instead of `composable(route)`.

### XML

```xml
<fragment android:id="@+id/loginFragment" ...>
  <action android:id="@+id/action_login_to_home" app:destination="@id/homeFragment"/>
</fragment>
```

```kotlin
findNavController().navigate(R.id.action_login_to_home)
// Safe Args:
findNavController().navigate(LoginFragmentDirections.actionToWhiskyDetail(id))
```

Prefer Safe Args plugin if project uses it.

---

## Flow

1. Read spec + context. Verify targets exist.
2. Find nav root (`NavHost` or `nav_graph.xml`). Don't duplicate.
3. Plan edits.
4. Write via Edit.
5. VM-side: pass `NavController` at composable boundary or use callback vars declared in spec. Don't add undeclared public members.
6. Verify: ask `/agent implement` to re-run `jui build`. Fix Kotlin errors.
7. Completion report:

```
## Navigation implemented (Android / {mode})

### Routes
- Route.WhiskyDetail(id) → "whisky/{id}"

### Files touched
- Route.kt, AppNavHost.kt, LoginScreen.kt

### Presentation
- whiskyDetail: composable / tastingForm: dialog

### Deep links
- Configured / skipped

### Build
- ✅ jui build 0 warnings

### What I did NOT change
- Spec / Layout / VM signatures / Interface
```

---

## Spec-external territory

Same principle as iOS — glue minimal; coordinator-level state → `/agent define`.

---

## Common pitfalls

1. Re-entry — `launchSingleTop = true` for single-instance
2. NavController leaks — don't store in VM
3. Process death — use `savedStateHandle`
4. Back stack — `popBackStack(route, inclusive)` is more reliable than raw `popBackStack()`
5. Deep links not triggering — check manifest intent filters
6. Mixing Fragment transitions + Compose animations — pick one per screen

---

## Handoff

```
Navigation for {screen} → {targets} is implemented (Android / {mode}).
jui build 0 warnings.
Return to /agent conductor.
```
"""
